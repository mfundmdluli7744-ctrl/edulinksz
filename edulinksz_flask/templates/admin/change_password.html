{% extends 'admin/layout.html' %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden animate-up">
            <div class="card-header bg-primary text-white py-4 text-center">
                <i class="fas fa-key fa-3x mb-3"></i>
                <h3 class="fw-bold mb-0">Change Your Password</h3>
                <p class="small mb-0 opacity-75 text-uppercase letter-spacing-1">Secure your administrative account</p>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small">New Secure Password</label>
                        <div class="input-group input-group-lg shadow-sm">
                            <span class="input-group-text bg-white border-0 ps-4"><i class="fas fa-lock text-primary-light"></i></span>
                            <input type="password" name="new_password" class="form-control border-0 bg-white ps-2" placeholder="••••••••" required>
                        </div>
                        <div class="form-text mt-2 small text-muted">Use a mix of letters, numbers, and symbols for better security.</div>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-bold text-muted small">Confirm Password</label>
                        <div class="input-group input-group-lg shadow-sm">
                            <span class="input-group-text bg-white border-0 ps-4"><i class="fas fa-check-double text-primary-light"></i></span>
                            <input type="password" name="confirm_password" class="form-control border-0 bg-white ps-2" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold rounded-pill shadow-lg">
                            <i class="fas fa-save me-2"></i> Update Password
                        </button>
                        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-link mt-3 text-muted text-decoration-none small">
                            Return to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
